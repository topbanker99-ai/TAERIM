<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>범블봇과 영어 대화 v7</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:"Noto Sans KR","Pretendard",sans-serif;
    background:
      radial-gradient(circle at 25% 20%, rgba(255,201,71,.25), transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(29,99,255,.22), transparent 50%),
      linear-gradient(135deg,#fff8e8 0%,#eaf1ff 100%);
    min-height:100vh;
    color:#1a2842;
    overflow-x:hidden;
  }
  .app{min-height:100vh;display:flex;flex-direction:column}

  .topbar{
    background:linear-gradient(135deg,#1d3a5c,#2e6fb0);
    color:#fff;padding:14px 22px;
    display:flex;align-items:center;justify-content:space-between;
    box-shadow:0 6px 20px rgba(0,0,0,.18);flex-wrap:wrap;gap:10px;
    position:relative;z-index:10;
  }
  .back-btn{
    background:rgba(255,255,255,.22);color:#fff;
    border:1px solid rgba(255,255,255,.4);padding:8px 16px;
    border-radius:999px;font-weight:800;font-size:13px;cursor:pointer;
    text-decoration:none;backdrop-filter:blur(6px);
  }
  .back-btn:hover{background:rgba(255,255,255,.35)}
  .topbar h1{
    font-family:"Fredoka","Noto Sans KR",sans-serif;
    font-size:18px;font-weight:900;flex:1;text-align:center;min-width:180px;
  }
  .gear{
    background:rgba(255,255,255,.22);color:#fff;border:1px solid rgba(255,255,255,.4);
    width:38px;height:38px;border-radius:50%;font-size:18px;cursor:pointer;
  }

  .main{
    flex:1;display:flex;flex-direction:column;align-items:center;
    padding:24px 18px;max-width:760px;margin:0 auto;width:100%;gap:18px;
  }

  /* =========================================
     범블비 로봇 얼굴 (SVG & Animation)
     ========================================= */
  .bot{
    width:200px;height:200px;display:grid;place-items:center;
    position: relative;
    filter:drop-shadow(0 10px 20px rgba(56, 189, 248, 0.4));
    transition: filter 0.3s;
  }
  .bot svg{width:100%;height:100%;animation:botFloat 3s ease-in-out infinite}
  
  @keyframes botFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

  .eye-glow{ transition: fill 0.3s, filter 0.3s; fill: #38bdf8; }
  
  .bot.speaking{
    filter:drop-shadow(0 0 25px rgba(56, 189, 248, 0.7));
  }
  .bot.speaking .eye-glow{
    animation: eyeGlowSpeaking 0.1s infinite alternate;
  }
  @keyframes eyeGlowSpeaking {
    0% { opacity: 0.7; filter: brightness(1); }
    100% { opacity: 1; filter: brightness(1.5) drop-shadow(0 0 5px #38bdf8); }
  }

  /* 입(마스크) 움직임 수정 */
  .bot.speaking #bot-mouth-mask{
    animation: maskMove 0.15s infinite alternate;
    transform-origin: 75px 120px; /* 얼굴 중심 좌표로 고정 */
  }
  @keyframes maskMove {
    0% { transform: translateY(0px) scaleY(1); }
    100% { transform: translateY(3px) scaleY(0.95); }
  }

  .bot.speaking svg{ animation: botBobSpeak 0.1s infinite; }
  @keyframes botBobSpeak{0%,100%{transform:translateY(-8px) translateX(0px)} 50%{transform:translateY(-9px) translateX(0.5px)}}

  .bot.listening .eye-glow{
    fill: #34d399; /* 초록색 */
    animation: eyeBlinkPulse 1.5s infinite;
  }
  @keyframes eyeBlinkPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #battle-mask {
    transform: translateY(-120px); 
    transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    opacity: 0;
  }
  .bot.battle-mode-on #battle-mask {
    transform: translateY(0);
    opacity: 1;
  }

  /* =========================================
     기존 UI 스타일 유지 및 조정
     ========================================= */
  .bot-status{
    font-weight:900;font-size:16px;color:#1d3a5c;text-align:center;min-height:24px;
    margin-top: -10px;
  }

  .stars {
    min-height: 35px;
    transition: transform 0.2s;
  }

  .photo-zone{
    width:100%;background:#fff;border-radius:24px;padding:20px;
    box-shadow:0 12px 32px rgba(50,80,130,.12);
    display:flex;flex-direction:column;align-items:center;gap:14px;
  }
  .photo-preview{
    width:100%;max-width:600px;min-height:260px;border-radius:18px;
    background:#f0f4fa;border:3px dashed #c8d4e6;
    display:grid;place-items:center;overflow:hidden;position:relative;
  }
  .photo-preview img{
    width:auto;max-width:100%;height:auto;max-height:70vh;
    object-fit:contain;display:block;border-radius:12px;
  }
  .photo-preview.has-photo{border-style:solid;border-color:#d8e5fb;background:#fff;padding:8px}
  .photo-preview .placeholder{
    text-align:center;color:#8a9bb5;font-weight:700;font-size:15px;line-height:1.6;padding:20px;
  }
  .photo-preview .placeholder .big{font-size:48px;display:block;margin-bottom:10px}

  .photo-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .photo-btn{
    background:#eef4ff;color:#174a98;border:2px solid #d8e5fb;
    padding:12px 20px;border-radius:14px;font-weight:800;font-size:14px;
    cursor:pointer;font-family:inherit;
  }
  .photo-btn:hover{background:#dde8ff}

  .talk-btn{
    width:100%;max-width:480px;padding:20px;border:0;border-radius:20px;
    font-family:"Fredoka","Noto Sans KR",sans-serif;font-weight:900;font-size:20px;
    cursor:pointer;transition:all .2s;box-shadow:0 10px 28px rgba(0,0,0,.18);
  }
  .talk-btn.start{background:linear-gradient(135deg,#ffd23f,#ff9e1b);color:#5a3500}
  .talk-btn.start:hover:not(:disabled){transform:translateY(-3px)}
  .talk-btn.stop{background:linear-gradient(135deg,#e74b4b,#c0392b);color:#fff}
  .talk-btn:disabled{opacity:.45;cursor:not-allowed}

  .transcript{
    width:100%;max-width:600px;background:#fff;border-radius:20px;padding:20px;
    box-shadow:0 6px 16px rgba(50,80,130,.08);
    max-height:300px;overflow-y:auto;display:none;flex-direction:column;gap:14px;align-items:center;
  }
  .transcript.show{display:flex}
  .msg{width:100%;text-align:center;line-height:1.4;border-radius:14px}
  .msg.bot{
    background:#fff4d6;color:#7a4a00;
    font-family:"Fredoka","Noto Sans KR",sans-serif;
    font-size:26px;font-weight:700;padding:16px 20px;
  }
  .msg.kid{display:none}

  .hint{font-size:13px;color:#7a8a9e;font-weight:600;text-align:center;line-height:1.6;max-width:480px}

  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:none;place-items:center;backdrop-filter:blur(4px);padding:20px;}
  .modal-bg.show{display:grid}
  .modal{background:#fff;border-radius:24px;padding:28px;max-width:520px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.4);max-height:90vh;overflow-y:auto;}
  .modal h2{font-size:20px;margin-bottom:14px;color:#1a2842}
  .modal label{font-size:14px;font-weight:800;color:#1a2842;display:block;margin:12px 0 6px}
  .modal input, .modal select{width:100%;padding:14px;border:2px solid #d8e5fb;border-radius:14px;font-size:14px;}
  .modal-btns{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
  .btn-primary{flex:1;min-width:120px;padding:14px;background:linear-gradient(135deg,#1d63ff,#2e6fb0);color:#fff;border:0;border-radius:14px;font-weight:900;font-size:14px;cursor:pointer;}
  .btn-ghost{padding:14px 18px;background:#f0f4fa;color:#1a2842;border:0;border-radius:14px;font-weight:800;font-size:13px;cursor:pointer;}
  
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a2842;color:#fff;padding:12px 22px;border-radius:999px;font-weight:800;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.3);opacity:0;transition:all .2s;z-index:10000;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
  .toast.fail{background:#b92929}
  .toast.success{background:#08794e}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <a href="index.html" class="back-btn">← 메뉴로</a>
    <h1>🤖 범블봇과 영어 대화</h1>
    <button class="gear" onclick="openSettings()">⚙️</button>
  </header>

  <main class="main">
    <div class="bot" id="bot">
      <svg viewBox="0 0 150 180" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bee-yellow" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#FFE082"/>
            <stop offset="0.5" stop-color="#FFCA28"/>
            <stop offset="1" stop-color="#FF8F00"/>
          </linearGradient>
          <linearGradient id="bee-metal" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0" stop-color="#CFD8DC"/>
            <stop offset="0.5" stop-color="#90A4AE"/>
            <stop offset="1" stop-color="#546E7A"/>
          </linearGradient>
          <radialGradient id="eye-socket" cx="50%" cy="50%" r="50%">
            <stop offset="50%" stop-color="#212121"/>
            <stop offset="100%" stop-color="#000000"/>
          </radialGradient>
        </defs>

        <g id="bot-head-shadow" opacity="0.3" transform="translate(0, 10)">
           <path d="M25,80 C25,30 50,20 75,20 C100,20 125,30 125,80 L125,110 C125,125 110,140 75,140 C40,140 25,125 25,110 Z" fill="#000"/>
        </g>

        <path d="M25,70 L5,30 L35,50 Z" fill="#FFCA28" stroke="#FF8F00" stroke-width="2" stroke-linejoin="round"/>
        <path d="M125,70 L145,30 L115,50 Z" fill="#FFCA28" stroke="#FF8F00" stroke-width="2" stroke-linejoin="round"/>

        <g id="bot-head-base">
          <path d="M25,80 C25,30 50,20 75,20 C100,20 125,30 125,80 L125,110 C125,125 110,140 75,140 C40,140 25,125 25,110 Z" fill="url(#bee-yellow)" stroke="#E65100" stroke-width="2.5"/>
          <path d="M65,22 L85,22 L80,45 L70,45 Z" fill="#FFC107" stroke="#E65100" stroke-width="2"/>
          <path d="M75,30 L65,40 L68,50 L75,46 L82,50 L85,40 Z" fill="#D32F2F" stroke="#b71c1c" stroke-width="1"/>
        </g>

        <g id="bot-face-front">
          <path d="M35,75 Q75,60 115,75 L110,105 Q75,115 40,105 Z" fill="url(#eye-socket)" stroke="#424242" stroke-width="2"/>
          <g class="eyes">
            <circle class="eye-glow" cx="55" cy="85" r="9" fill="#38bdf8"/>
            <circle cx="52" cy="82" r="3" fill="#FFFFFF" opacity="0.9"/>
            <circle class="eye-glow" cx="95" cy="85" r="9" fill="#38bdf8"/>
            <circle cx="92" cy="82" r="3" fill="#FFFFFF" opacity="0.9"/>
          </g>
        </g>

        <g id="bot-mouth-mask">
          <path d="M40,105 Q75,90 110,105 L118,120 C118,140 95,145 75,145 C55,145 32,140 32,120 Z" fill="url(#bee-metal)" stroke="#37474F" stroke-width="2.5"/>
          
          <line x1="60" y1="120" x2="90" y2="120" stroke="#263238" stroke-width="3.5" stroke-linecap="round"/>
          <line x1="65" y1="128" x2="85" y2="128" stroke="#263238" stroke-width="3" stroke-linecap="round"/>
          <line x1="70" y1="136" x2="80" y2="136" stroke="#263238" stroke-width="2.5" stroke-linecap="round"/>
          
          <circle cx="35" cy="115" r="7" fill="#78909C" stroke="#37474F" stroke-width="2"/>
          <circle cx="115" cy="115" r="7" fill="#78909C" stroke="#37474F" stroke-width="2"/>
        </g>

        <g id="battle-mask">
          <path d="M25,40 Q75,20 125,40 L130,75 L20,75 Z" fill="#FFCA28" stroke="#E65100" stroke-width="2"/>
          <path d="M20,75 L55,95 L75,85 L95,95 L130,75 L120,135 Q75,155 30,135 Z" fill="url(#bee-metal)" stroke="#37474F" stroke-width="2.5"/>
          <polygon points="45,95 65,105 45,112" fill="#38bdf8" opacity="0.9"/>
          <polygon points="105,95 85,105 105,112" fill="#38bdf8" opacity="0.9"/>
          <rect x="71" y="95" width="8" height="30" rx="2" fill="#212121"/>
          <rect x="65" y="110" width="20" height="4" rx="1" fill="#212121"/>
        </g>
      </svg>
    </div>
    <div class="bot-status" id="botStatus">버튼을 눌러 범블봇과 대화해요!</div>
    <div class="stars" id="stars" style="font-size:26px;letter-spacing:4px;min-height:32px;color:#ffc947"></div>

    <div class="photo-zone">
      <div class="photo-preview" id="photoPreview">
        <div class="placeholder">
          <span class="big">📷</span>
          사진은 올려도 되고 안 올려도 돼요<br>
          (그림·장난감·동물 사진을 올리면<br>범블봇이 보고 같이 얘기해요!)
        </div>
      </div>
      <div class="photo-btns">
        <button class="photo-btn" onclick="document.getElementById('fileInput').click()">🖼️ 사진 고르기</button>
        <button class="photo-btn" onclick="document.getElementById('camInput').click()">📸 사진 찍기</button>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none">
      <input type="file" id="camInput" accept="image/*" capture="environment" style="display:none">
    </div>

    <button class="talk-btn start" id="talkBtn" onclick="toggleTalk()" disabled>🎤 대화 시작하기</button>

    <p class="hint" id="hint">먼저 ⚙️에서 OpenAI 키를 넣고, 사진을 올린 다음 시작하세요.<br>마이크 권한을 허용해야 대화할 수 있어요.</p>

    <div class="transcript" id="transcript"></div>
  </main>
</div>

<audio id="botAudio" autoplay></audio>

<div class="modal-bg" id="settingsModal">
  <div class="modal">
    <h2>🤖 범블봇 설정</h2>
    <p id="keyStatus"></p>
    <label>OpenAI API 키</label>
    <input id="keyInput" type="password" placeholder="sk-... 붙여넣기">

    <label>🎙️ 목소리</label>
    <select id="voiceSelect">
      <option value="ash">Ash — 깊은 남성 (로봇 추천)</option>
      <option value="echo">Echo — 차분한 남성</option>
      <option value="alloy">Alloy — 중성</option>
      <option value="coral">Coral — 밝은 여성</option>
    </select>

    <label>🤖 로봇 목소리 효과</label>
    <select id="robotSelect">
      <option value="off">끄기</option>
      <option value="mild">약하게</option>
      <option value="strong" selected>강하게 (추천)</option>
    </select>

    <label>🧒 태림이 소개</label>
    <textarea id="kidInfoInput" rows="5" style="width:100%;padding:14px;border:2px solid #d8e5fb;border-radius:14px;resize:vertical"></textarea>

    <div class="modal-btns">
      <button class="btn-primary" onclick="saveSettings()">💾 저장</button>
      <button class="btn-ghost" onclick="closeSettings()">닫기</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MODEL = 'gpt-realtime-mini';

let pc = null;
let dc = null;
let localStream = null;
let audioCtx = null;
let isActive = false;
let photoDataUrl = null;
let botSpeaking = false;

function getKey(){ return localStorage.getItem('openai_api_key') || ''; }
function getVoice(){ return localStorage.getItem('bot_voice') || 'ash'; }
function getRobot(){ return localStorage.getItem('bot_robot') || 'strong'; }
const DEFAULT_KID_INFO = `- 이름: 태림\n- 나이: 6살\n- 좋아하는 것: 트랜스포머, 로봇, 스파이더맨`;
function getKidInfo(){ return localStorage.getItem('kid_info') || DEFAULT_KID_INFO; }

function openSettings(){
  const k = getKey();
  document.getElementById('keyStatus').innerHTML = k ? `✅ 키 설정됨` : '❌ 키 없음';
  document.getElementById('keyInput').value = k;
  document.getElementById('voiceSelect').value = getVoice();
  document.getElementById('robotSelect').value = getRobot();
  document.getElementById('kidInfoInput').value = getKidInfo();
  document.getElementById('settingsModal').classList.add('show');
}
function closeSettings(){ document.getElementById('settingsModal').classList.remove('show'); }
function saveSettings(){
  const k = document.getElementById('keyInput').value.trim();
  if(k) localStorage.setItem('openai_api_key', k);
  localStorage.setItem('bot_voice', document.getElementById('voiceSelect').value);
  localStorage.setItem('bot_robot', document.getElementById('robotSelect').value);
  localStorage.setItem('kid_info', document.getElementById('kidInfoInput').value);
  closeSettings();
  showToast('💾 저장 완료!', 'success');
  updateReady();
}

function handlePhoto(file){
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const max = 1280;
      let w = img.width, h = img.height;
      if(w > h && w > max){ h = h * max / w; w = max; }
      else if(h > max){ w = w * max / h; h = max; }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      photoDataUrl = canvas.toDataURL('image/jpeg', 0.85);
      const prev = document.getElementById('photoPreview');
      prev.classList.add('has-photo');
      prev.innerHTML = `<img src="${photoDataUrl}" alt="사진">`;
      updateReady();
      showToast('📷 사진 준비 완료!', 'success');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}
document.getElementById('fileInput').addEventListener('change', e => handlePhoto(e.target.files[0]));
document.getElementById('camInput').addEventListener('change', e => handlePhoto(e.target.files[0]));

function updateReady(){
  const hasKey = !!getKey();
  document.getElementById('talkBtn').disabled = !hasKey;
  if(!hasKey) document.getElementById('hint').innerHTML = '⚙️에서 OpenAI 키를 먼저 넣어주세요.';
  else document.getElementById('hint').innerHTML = photoDataUrl ? '준비 완료! 대화 시작하기를 눌러요.' : '사진을 올리거나 바로 대화를 시작해요!';
}

function buildInstructions(){
  return `너는 '범블봇'이야. 트랜스포머의 범블비처럼 씩씩하고 친절해. 6살 한국 아이 '태림이'에게 영어를 가르쳐주는 친구야.
[태림이 정보]\n${getKidInfo()}
[규칙]\n1. 짧은 문장을 통째로 따라 하게 해. (단어 하나 금지)\n2. 한국어로 다정하게 말하고, 따라 할 영어 문장은 크고 또박또박 말해줘.\n3. 별을 얻었다고 신나게 칭찬해줘.`;
}

function toggleTalk(){ isActive ? stopTalk() : startTalk(); }

async function startTalk(){
  if(!getKey()){ showToast('⚠️ 키를 넣어주세요', 'fail'); openSettings(); return; }
  setStatus('범블봇 부르는 중... 🐝', '');
  document.getElementById('talkBtn').disabled = true;

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    audioCtx = new AudioContext();

    const tokenResp = await fetch('https://api.openai.com/v1/realtime/client_secrets', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${getKey()}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({ session: { type: 'realtime', model: MODEL, instructions: buildInstructions(), audio: { output: { voice: getVoice() } } } })
    });
    const tokenData = await tokenResp.json();
    const ephemeralKey = tokenData.value;

    pc = new RTCPeerConnection();
    pc.ontrack = e => {
      const audioEl = document.getElementById('botAudio');
      audioEl.srcObject = e.streams[0];
      applyRobotVoice(e.streams[0], audioEl);
    };
    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    dc = pc.createDataChannel('oai-events');
    dc.onopen = () => {
      console.log('채널 오픈');
      dc.send(JSON.stringify({ type: 'session.update', session: { turn_detection: { type: 'server_vad' } } }));
      setTimeout(sendFirstMsg, 500);
    };
    dc.onmessage = e => handleEvent(JSON.parse(e.data));

    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);

    const sdpResp = await fetch(`https://api.openai.com/v1/realtime/calls?model=${MODEL}`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${ephemeralKey}`, 'Content-Type': 'application/sdp' },
      body: offer.sdp
    });
    const answerSdp = await sdpResp.text();
    await pc.setRemoteDescription({ type: 'answer', sdp: answerSdp });

    isActive = true;
    document.getElementById('talkBtn').disabled = false;
    document.getElementById('talkBtn').className = 'talk-btn stop';
    document.getElementById('talkBtn').textContent = '⏹ 대화 끝내기';
    document.getElementById('transcript').classList.add('show');
    setStatus('반가워 태림아! 듣고 있어! 🎤', 'listening');

  } catch(err){
    console.error(err);
    showToast('연결 실패', 'fail');
    cleanup();
  }
}

function sendFirstMsg(){
  let content = [{ type: 'input_text', text: '태림이에게 신나게 첫 인사를 해줘.' }];
  if(photoDataUrl) content.unshift({ type: 'input_image', image_url: photoDataUrl });
  dc.send(JSON.stringify({ type: 'conversation.item.create', item: { type: 'message', role: 'user', content } }));
  dc.send(JSON.stringify({ type: 'response.create' }));
}

let curBotText = '';
function handleEvent(ev){
  switch(ev.type){
    case 'response.created':
      botSpeaking = true;
      setStatus('범블봇 말하는 중... 🗣️', 'speaking');
      curBotText = '';
      break;
    case 'response.output_audio_transcript.delta':
      curBotText += ev.delta;
      break;
    case 'response.output_audio_transcript.done':
      if(curBotText.trim()){
        const eng = extractEnglish(curBotText);
        if(eng) addMsg('bot', eng);
      }
      break;
    case 'response.done':
      botSpeaking = false;
      setStatus('태림아, 따라 말해봐! 🎤', 'listening');
      break;
    case 'input_audio_buffer.speech_started':
      setStatus('듣고 있어요... 👂', 'listening');
      break;
    case 'conversation.item.input_audio_transcription.completed':
      if(ev.transcript.trim()){
        addStar();
      }
      break;
  }
}

function extractEnglish(text){
  const matches = text.match(/[A-Za-z][A-Za-z0-9 .,!?'"\-]*/g);
  return matches ? matches.join(' ').replace(/\s+/g, ' ').trim() : '';
}

let starCount = 0;
function addStar(){
  starCount++;
  const el = document.getElementById('stars');
  el.textContent = '⭐'.repeat(Math.min(starCount, 10)) + (starCount > 10 ? ` +${starCount-10}` : '');
  el.style.transform = 'scale(1.3)';
  setTimeout(()=> el.style.transform = 'scale(1)', 200);

  triggerBattleMask();

  if(starCount % 5 === 0) showToast(`🏆 대단해 태림아! 별 ${starCount}개!`, 'success');
}

function triggerBattleMask() {
  const botEl = document.getElementById('bot');
  botEl.classList.add('battle-mode-on');
  setTimeout(() => { botEl.classList.remove('battle-mode-on'); }, 1500);
}

function resetStars(){ starCount = 0; document.getElementById('stars').textContent = ''; }

function applyRobotVoice(stream, audioEl){
  if(getRobot() === 'off'){ audioEl.muted = false; return; }
  audioEl.muted = true;
  const src = audioCtx.createMediaStreamSource(stream);
  
  const biquad = audioCtx.createBiquadFilter();
  biquad.type = 'peaking';
  biquad.frequency.value = 1500;
  biquad.Q.value = 5;
  biquad.gain.value = getRobot() === 'strong' ? 15 : 7;

  const dist = audioCtx.createWaveShaper();
  function makeDistortionCurve(amount) {
    let k = typeof amount === 'number' ? amount : 50, n_samples = 44100, curve = new Float32Array(n_samples), s;
    for (let i = 0; i < n_samples; ++i ) { s = ( i * 2 ) / n_samples - 1; curve[i] = ( ( 3 + k ) * s * 20 * Math.PI / 180 ) / ( Math.PI + k * Math.abs(s) ); }
    return curve;
  };
  dist.curve = makeDistortionCurve(getRobot() === 'strong' ? 100 : 30);
  dist.oversample = '4x';

  src.connect(biquad); biquad.connect(dist); dist.connect(audioCtx.destination);
}

let toastTimer;
function stopTalk(){ cleanup(); setStatus('다음에 또 만나! 태림아 🐝', ''); document.getElementById('talkBtn').className = 'talk-btn start'; document.getElementById('talkBtn').textContent = '🎤 대화 시작하기'; }
function cleanup(){ isActive = false; if(dc) dc.close(); if(pc) pc.close(); if(localStream) localStream.getTracks().forEach(t=>t.stop()); if(audioCtx) audioCtx.close(); dc=null; pc=null; localStream=null; audioCtx=null; }
function setStatus(text, botClass){ document.getElementById('botStatus').textContent = text; document.getElementById('bot').className = 'bot ' + botClass; }
function addMsg(who, text){ const t = document.getElementById('transcript'); const div = document.createElement('div'); div.className = 'msg ' + who; div.textContent = text; t.appendChild(div); const bots = t.querySelectorAll('.msg.bot'); if(bots.length > 5) bots[0].remove(); t.scrollTop = t.scrollHeight; }
function showToast(text, type='', dur=2500){ const el = document.getElementById('toast'); el.textContent = text; el.className = `toast show ${type}`; clearTimeout(toastTimer); toastTimer = setTimeout(()=> el.className='toast', dur); }

window.addEventListener('beforeunload', cleanup);
updateReady();
</script>
