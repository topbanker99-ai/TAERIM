<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>태림이의 영어 우주 — 학습 놀이터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@500;700&family=Baloo+2:wght@800&display=swap" rel="stylesheet">
<style>
:root{
  --space:#0E1B3D; --space2:#1C2B5A;
  --navy:#1C2B4A; --sun:#FFB400; --sun2:#FFC947;
  --mint:#28C7A0; --coral:#FF6B6B; --grape:#7C5CFF; --blue:#3FA7FF; --pink:#FF8FB1;
  --white:#fff;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{
  font-family:'Jua',sans-serif;color:#fff;min-height:100vh;overflow-x:hidden;
  background:
    radial-gradient(circle at 18% 12%, rgba(124,92,255,.22), transparent 38%),
    radial-gradient(circle at 82% 80%, rgba(63,167,255,.18), transparent 42%),
    radial-gradient(circle at 50% 50%, rgba(255,180,0,.06), transparent 60%),
    var(--space);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:30px 20px;
}
/* 별빛 */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.stars i{position:absolute;width:3px;height:3px;border-radius:50%;background:#fff;opacity:.5;animation:tw 3s infinite}
@keyframes tw{0%,100%{opacity:.2}50%{opacity:.9}}
/* 떠다니는 행성 장식 */
.deco{position:fixed;pointer-events:none;z-index:0;opacity:.55;animation:drift 8s ease-in-out infinite}
.deco.d1{top:12%;left:8%;font-size:48px}
.deco.d2{top:20%;right:10%;font-size:38px;animation-delay:1.5s}
.deco.d3{bottom:14%;left:12%;font-size:42px;animation-delay:3s}
.deco.d4{bottom:22%;right:8%;font-size:34px;animation-delay:2s}
@keyframes drift{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-18px) rotate(8deg)}}

.wrap{position:relative;z-index:2;width:100%;max-width:860px;text-align:center}

/* 헤더 */
.hero-logo{font-size:64px;margin-bottom:6px;filter:drop-shadow(0 0 18px rgba(255,180,0,.5));animation:bob 3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
h1{font-size:34px;letter-spacing:.5px;margin-bottom:8px;text-shadow:0 2px 12px rgba(0,0,0,.4)}
.subtitle{font-family:'Noto Sans KR';font-weight:500;font-size:15.5px;color:#CBD8F5;margin-bottom:6px}
.greeting{font-size:17px;color:var(--sun2);margin-bottom:34px}

/* 카드 2개 */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:22px}
@media(max-width:680px){.cards{grid-template-columns:1fr;gap:18px}}
.card{
  border:0;cursor:pointer;text-align:left;color:#fff;
  border-radius:28px;padding:28px 26px;position:relative;overflow:hidden;
  background:rgba(255,255,255,.07);border:2.5px solid rgba(255,255,255,.16);
  transition:transform .15s, box-shadow .15s, border-color .15s;
  display:flex;flex-direction:column;gap:6px;min-height:260px;
}
.card::before{
  content:'';position:absolute;inset:0;opacity:.16;z-index:0;transition:opacity .15s;
}
.card.talk::before{background:radial-gradient(circle at 70% 20%, var(--blue), transparent 60%)}
.card.phonics::before{background:radial-gradient(circle at 70% 20%, var(--sun), transparent 60%)}
.card:hover{transform:translateY(-6px);box-shadow:0 16px 44px rgba(0,0,0,.45)}
.card.talk:hover{border-color:var(--blue)}
.card.phonics:hover{border-color:var(--sun)}
.card:active{transform:translateY(-2px) scale(.99)}
.card>*{position:relative;z-index:1}
.card .emoji{font-size:62px;line-height:1;margin-bottom:6px}
.card .badge{
  display:inline-block;font-family:'Noto Sans KR';font-weight:700;font-size:12px;
  padding:4px 12px;border-radius:999px;margin-bottom:10px;width:fit-content;
}
.card.talk .badge{background:rgba(63,167,255,.25);color:#BFE3FF}
.card.phonics .badge{background:rgba(255,180,0,.25);color:#FFE3A6}
.card h2{font-size:23px;margin-bottom:4px}
.card .desc{font-family:'Noto Sans KR';font-weight:500;font-size:14px;line-height:1.65;color:#D5E0F5;flex:1}
.card .tags{font-family:'Noto Sans KR';font-weight:500;font-size:12.5px;color:#9FB2D8;margin-top:10px}
.card .go{
  margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;
  font-size:17px;padding:13px;border-radius:16px;font-family:'Jua';
}
.card.talk .go{background:linear-gradient(135deg,var(--blue),#5FB8FF);color:#06213B}
.card.phonics .go{background:linear-gradient(135deg,var(--sun),var(--sun2));color:var(--navy)}

.footer-note{
  margin-top:30px;font-family:'Noto Sans KR';font-weight:500;font-size:13px;color:#8294BC;line-height:1.6;
}

@media (prefers-reduced-motion: reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="deco d1">🪐</div>
<div class="deco d2">⭐</div>
<div class="deco d3">🚀</div>
<div class="deco d4">✨</div>

<div class="wrap">
  <div class="hero-logo">🚀</div>
  <h1>태림이의 영어 우주</h1>
  <div class="subtitle">두 가지 신나는 영어 놀이가 기다리고 있어요</div>
  <div class="greeting" id="greeting">오늘은 무엇을 하고 놀까요? 🌟</div>

  <div class="cards">
    <!-- 영어 대화 -->
    <button class="card talk" onclick="go('transformer.html')">
      <div class="emoji">🤖</div>
      <span class="badge">AI 변신로봇과 대화</span>
      <h2>영어 대화</h2>
      <div class="desc">변신로봇 친구와 영어로 이야기해요. 사진을 보며 말하고, 따라 말하면 로봇이 멋지게 변신해요!</div>
      <div class="tags">🎤 말하기 · 📸 사진 대화 · ✨ 변신</div>
      <div class="go">시작하기 →</div>
    </button>

    <!-- 파닉스 -->
    <button class="card phonics" onclick="go('phonics.html')">
      <div class="emoji">🪐</div>
      <span class="badge">소리 로켓 수리 대작전</span>
      <h2>파닉스</h2>
      <div class="desc">소리 행성을 여행하며 알파벳 소리를 배워요. 게임도 하고, 단어도 만들고, 이야기 책도 읽어요!</div>
      <div class="tags">🔤 소리 · 🧩 단어 만들기 · 📚 이야기 책</div>
      <div class="go">시작하기 →</div>
    </button>
  </div>

  <div class="footer-note">태림이의 영어 우주 · 두 앱을 자유롭게 오가며 놀 수 있어요 🌙</div>
</div>

<script>
// 별빛 배경
(function(){
  const sf=document.getElementById('stars');
  for(let i=0;i<54;i++){
    const s=document.createElement('i');
    s.style.left=Math.random()*100+'vw';
    s.style.top=Math.random()*100+'vh';
    s.style.animationDelay=(Math.random()*3)+'s';
    s.style.transform='scale('+(0.5+Math.random()*1.2)+')';
    sf.appendChild(s);
  }
  // 시간대별 인사
  const h=new Date().getHours();
  const g=document.getElementById('greeting');
  if(h<12) g.textContent='좋은 아침이에요! 오늘도 영어 놀이 시작해요 🌅';
  else if(h<18) g.textContent='오늘은 무엇을 하고 놀까요? 🌟';
  else g.textContent='안녕! 오늘 영어 놀이 한 판 어때요? 🌙';
})();
function go(url){ window.location.href=url; }
</script>
</body>
</html>
