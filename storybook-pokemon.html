<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ 이찬이 형과 포켓몬 여행</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --primary:#ff5ca8;
    --accent:#7c3aed;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:"Noto Sans KR","Pretendard",sans-serif;
    background:linear-gradient(135deg,#fff8e8 0%,#fff 50%,#e8f1ff 100%);
    min-height:100vh;
    color:#1a2842;
    overflow-x:hidden;
  }
  .app{min-height:100vh;display:flex;flex-direction:column}

  /* TOP BAR */
  .topbar{
    background:linear-gradient(135deg,#ff5ca8,#7c3aed);
    color:#fff;
    padding:14px 22px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    box-shadow:0 6px 20px rgba(0,0,0,.15);
    flex-wrap:wrap;
    gap:10px;
    position:relative;
    z-index:10;
  }
  .back-btn{
    background:rgba(255,255,255,.22);
    color:#fff;
    border:1px solid rgba(255,255,255,.4);
    padding:8px 16px;
    border-radius:999px;
    font-weight:800;
    font-size:13px;
    cursor:pointer;
    text-decoration:none;
    backdrop-filter:blur(6px);
  }
  .back-btn:hover{background:rgba(255,255,255,.35)}
  .topbar h1{
    font-family:"Fredoka","Noto Sans KR",sans-serif;
    font-size:18px;
    font-weight:900;
    flex:1;
    text-align:center;
    min-width:200px;
  }
  .page-indicator{
    background:rgba(255,255,255,.22);
    padding:8px 16px;
    border-radius:999px;
    font-weight:900;
    font-size:14px;
    border:1px solid rgba(255,255,255,.4);
  }

  /* COVER */
  .cover{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:30px 20px;
    text-align:center;
  }
  .cover img{
    max-width:min(800px, 92vw);
    max-height:60vh;
    border-radius:24px;
    box-shadow:0 18px 48px rgba(60,40,20,.28);
  }
  .cover h2{
    font-family:"Fredoka","Noto Sans KR",sans-serif;
    font-size:clamp(22px,3.5vw,36px);
    font-weight:900;
    margin:24px 0 8px;
    color:#1a2842;
  }
  .cover .ko-title{
    font-size:clamp(15px,2.4vw,20px);
    color:#5a6b88;
    font-weight:800;
    margin-bottom:6px;
  }
  .cover .author{
    font-size:13px;
    color:#a8a899;
    font-weight:600;
    margin-bottom:30px;
  }
  .start-btn{
    background:linear-gradient(135deg,var(--primary),var(--accent));
    color:#fff;
    font-size:18px;
    font-weight:900;
    padding:18px 36px;
    border:0;border-radius:999px;
    cursor:pointer;
    box-shadow:0 10px 28px rgba(0,0,0,.2);
    font-family:inherit;
    transition:all .2s;
  }
  .start-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 14px 36px rgba(0,0,0,.3);
  }

  /* STORY PAGE */
  .story-page{
    flex:1;
    display:none;
    grid-template-columns:1fr 1fr;
    gap:24px;
    padding:24px;
    max-width:1400px;
    margin:0 auto;
    width:100%;
    align-items:stretch;
  }
  .story-page.active{display:grid}

  .illustration{
    border-radius:24px;
    overflow:hidden;
    box-shadow:0 14px 40px rgba(60,40,20,.18);
    background:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:400px;
  }
  .illustration img{
    width:100%;
    height:auto;
    display:block;
    max-height:75vh;
    object-fit:contain;
  }

  .reading-panel{
    display:flex;
    flex-direction:column;
    gap:14px;
    min-height:0;
  }

  .sentence-progress{
    background:#fff;
    border-radius:18px;
    padding:14px 18px;
    box-shadow:0 6px 16px rgba(50,80,130,.08);
    display:flex;
    align-items:center;
    gap:14px;
    font-weight:800;
    font-size:14px;
    color:#5a6b88;
  }
  .dots{
    display:flex;
    gap:8px;
    flex:1;
    flex-wrap:wrap;
  }
  .dot{
    width:14px;height:14px;border-radius:50%;
    background:#e0e6f0;
    transition:all .25s;
  }
  .dot.current{
    background:var(--primary);
    box-shadow:0 0 0 4px #ff5ca833;
    transform:scale(1.25);
  }
  .dot.done{background:#13a36e}

  .sentence-card{
    background:#fff;
    border:3px solid var(--primary);
    border-radius:28px;
    padding:34px 28px;
    flex:1;
    display:flex;
    flex-direction:column;
    justify-content:center;
    box-shadow:0 16px 40px rgba(0,0,0,.1);
    position:relative;
    min-height:240px;
  }
  .sentence-card::before{
    content:'⚡';
    position:absolute;
    top:-22px;left:24px;
    font-size:40px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.2));
  }
  .sentence-num{
    position:absolute;
    top:14px;right:20px;
    font-family:"Fredoka",sans-serif;
    font-weight:700;
    font-size:14px;
    color:#a8b3c5;
  }
  .sentence-en{
    font-family:"Fredoka","Noto Sans KR",sans-serif;
    font-size:clamp(26px,3.5vw,38px);
    font-weight:900;
    color:#1a2842;
    line-height:1.3;
    letter-spacing:-.01em;
    margin-bottom:14px;
    text-align:center;
  }
  .sentence-ko{
    font-size:clamp(16px,2.2vw,20px);
    color:#5a6b88;
    font-weight:700;
    line-height:1.55;
    text-align:center;
    padding-top:14px;
    border-top:2px dashed #e0e6f0;
  }

  .card-actions{
    display:flex;
    gap:10px;
    justify-content:center;
    margin-top:18px;
    padding-top:14px;
    border-top:1px dashed #e0e6f0;
  }
  .action-btn{
    padding:9px 16px;
    border-radius:999px;
    background:#f0f4fa;
    color:#1a2842;
    border:1px solid #e0e6f0;
    font-weight:800;
    font-size:13px;
    cursor:pointer;
    font-family:inherit;
    transition:all .15s;
  }
  .action-btn:hover{
    background:#e6ecf5;
    transform:translateY(-1px);
  }
  .action-btn.primary{
    background:var(--primary);
    color:#fff;
    border-color:transparent;
  }

  .mic-status{
    background:#fff;
    border:3px solid #ffc947;
    border-radius:20px;
    padding:14px 18px;
    display:flex;
    align-items:center;
    gap:12px;
    box-shadow:0 6px 16px rgba(255,201,71,.2);
  }
  .mic-status.listening{
    background:linear-gradient(135deg,#eafaf3,#fff);
    border-color:#13a36e;
  }
  .mic-icon{
    width:42px;height:42px;
    background:#ffc947;
    color:#5a3500;
    border-radius:50%;
    display:grid;place-items:center;
    font-size:22px;
    flex-shrink:0;
  }
  .mic-status.listening .mic-icon{
    background:#13a36e;
    color:#fff;
    animation:pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(19,163,110,.6)}
    50%{box-shadow:0 0 0 12px rgba(19,163,110,0)}
  }
  .mic-text{
    flex:1;
    font-weight:800;
    font-size:14px;
    color:#5a6b88;
  }
  .mic-status.listening .mic-text{color:#08794e}

  /* NAV */
  .nav-bar{
    background:#fff;
    border-top:1px solid #e0e6f0;
    padding:14px 22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:12px;
    box-shadow:0 -6px 20px rgba(50,80,130,.06);
  }
  .nav-btn{
    background:#fff;
    border:2px solid #d8e5fb;
    color:#174a98;
    padding:10px 18px;
    border-radius:14px;
    font-weight:900;
    font-size:14px;
    cursor:pointer;
    font-family:inherit;
    transition:all .15s;
  }
  .nav-btn:hover:not(:disabled){
    background:#eef4ff;
    border-color:var(--primary);
  }
  .nav-btn:disabled{opacity:.45;cursor:not-allowed}
  .nav-btn.primary{
    background:linear-gradient(135deg,var(--primary),var(--accent));
    color:#fff;
    border-color:transparent;
  }

  /* FX */
  .stars-fx{
    position:fixed;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    z-index:9999;
    font-size:80px;
    opacity:0;
    pointer-events:none;
  }
  .stars-fx.show{animation:star-pop 1.8s ease-out forwards}
  @keyframes star-pop{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.3)}
    25%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}
    75%{opacity:1;transform:translate(-50%,-50%) scale(1)}
    100%{opacity:0;transform:translate(-50%,-80%) scale(1)}
  }
  .toast{
    position:fixed;
    bottom:90px;left:50%;
    transform:translateX(-50%);
    background:#1a2842;
    color:#fff;
    padding:12px 22px;
    border-radius:999px;
    font-weight:800;
    font-size:14px;
    box-shadow:0 8px 24px rgba(0,0,0,.3);
    opacity:0;
    transition:all .2s;
    z-index:1000;
    max-width:90vw;
    text-align:center;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}
  .toast.success{background:#08794e}
  .toast.fail{background:#b92929}

  /* Sentence transition */
  .sentence-card.swap-out .sentence-en,
  .sentence-card.swap-out .sentence-ko{
    opacity:0;
    transform:translateY(-15px);
    transition:all .3s;
  }
  .sentence-card.swap-in .sentence-en,
  .sentence-card.swap-in .sentence-ko{
    animation:swap-in .35s ease forwards;
  }
  @keyframes swap-in{
    from{opacity:0;transform:translateY(15px)}
    to{opacity:1;transform:translateY(0)}
  }

  @media(max-width:900px){
    .story-page{grid-template-columns:1fr;padding:14px;gap:16px}
    .illustration{min-height:auto;max-height:40vh}
    .sentence-en{font-size:24px}
    .sentence-card{padding:24px 20px;min-height:200px}
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <a href="index.html" class="back-btn">← 메뉴로</a>
    <h1>⚡ 이찬이 형과 포켓몬 여행</h1>
    <div class="page-indicator" id="pageIndicator">표지</div>
  </header>

  <!-- COVER -->
  <section class="cover" id="coverPage">
    <img id="coverImg" src="" alt="cover"/>
    <h2 id="coverTitle"></h2>
    <p class="ko-title" id="coverKoTitle"></p>
    <p class="author" id="coverAuthor"></p>
    <button class="start-btn" onclick="startStory()">📚 책 읽기 시작 ▶</button>
  </section>

  <!-- STORY -->
  <section class="story-page" id="storyPage">
    <div class="illustration">
      <img id="pageImg" src="" alt="page"/>
    </div>
    <div class="reading-panel">
      <div class="sentence-progress">
        <span id="progressLabel">문장 1 / 5</span>
        <div class="dots" id="dotsContainer"></div>
      </div>

      <div class="sentence-card" id="sentenceCard">
        <div class="sentence-num" id="sentenceNum">1 / 5</div>
        <div class="sentence-en" id="sentenceEn">...</div>
        <div class="sentence-ko" id="sentenceKo">...</div>
        <div class="card-actions">
          <button class="action-btn" onclick="replaySentence()">🔊 다시 듣기</button>
          <button class="action-btn" onclick="skipSentence()">⏭ 건너뛰기</button>
        </div>
      </div>

      <div class="mic-status" id="micStatus">
        <div class="mic-icon" id="micIcon">🎤</div>
        <div class="mic-text" id="micText">마이크를 시작하려면 책 읽기 시작 버튼을 눌러주세요</div>
      </div>
    </div>
  </section>

  <nav class="nav-bar" id="navBar" style="display:none">
    <button class="nav-btn" id="prevBtn" onclick="prevPage()">← 이전 페이지</button>
    <button class="nav-btn" onclick="replaySentence()">🔁 다시 듣기</button>
    <button class="nav-btn primary" id="nextBtn" onclick="nextPage()">다음 페이지 →</button>
  </nav>
</div>

<div class="stars-fx" id="starsFx">⭐</div>
<div class="toast" id="toast"></div>

let currentPageIdx = 0;
let currentSentenceIdx = 0;
let recognition = null;
let isListening = false;
let audioUnlocked = false;
let restartTimer = null;
let inProgress = false;

function initCover(){
  const c = STORY_PAGES[0];
  document.getElementById('coverImg').src = c.image;
  document.getElementById('coverTitle').textContent = c.title;
  document.getElementById('coverKoTitle').textContent = c.subtitle;
  document.getElementById('coverAuthor').textContent = c.author;
}

function startStory(){
  audioUnlocked = true;
  document.getElementById('coverPage').style.display = 'none';
  document.getElementById('storyPage').classList.add('active');
  document.getElementById('navBar').style.display = 'flex';
  currentPageIdx = 1;
  renderPage();
  setTimeout(()=> beginCurrentSentence(), 500);
}

function renderPage(){
  const page = STORY_PAGES[currentPageIdx];
  if(!page || page.isCover) return;

  document.getElementById('pageImg').src = page.image;
  document.getElementById('pageIndicator').textContent = `${currentPageIdx} / ${STORY_PAGES.length - 1}`;

  currentSentenceIdx = 0;
  renderDots();
  showCurrentSentence();

  document.getElementById('prevBtn').disabled = currentPageIdx <= 1;
}

function renderDots(){
  const page = STORY_PAGES[currentPageIdx];
  const total = page.sentences.length;
  let html = '';
  for(let i = 0; i < total; i++){
    const cls = i < currentSentenceIdx ? 'done' : (i === currentSentenceIdx ? 'current' : '');
    html += `<div class="dot ${cls}"></div>`;
  }
  document.getElementById('dotsContainer').innerHTML = html;
  document.getElementById('progressLabel').textContent = `문장 ${Math.min(currentSentenceIdx + 1, total)} / ${total}`;
}

function showCurrentSentence(){
  const page = STORY_PAGES[currentPageIdx];
  if(!page || page.isCover) return;
  if(currentSentenceIdx >= page.sentences.length) return;

  const card = document.getElementById('sentenceCard');
  const s = page.sentences[currentSentenceIdx];

  // Swap-out animation
  card.classList.remove('swap-in');
  card.classList.add('swap-out');

  setTimeout(()=>{
    document.getElementById('sentenceEn').textContent = s.en;
    document.getElementById('sentenceKo').textContent = s.ko;
    document.getElementById('sentenceNum').textContent = `${currentSentenceIdx + 1} / ${page.sentences.length}`;
    card.classList.remove('swap-out');
    card.classList.add('swap-in');
  }, 200);
}

// === TTS ===
function getEnglishVoice(){
  const voices = window.speechSynthesis.getVoices();
  // 자연스러운 영어 음성 우선
  const prefer = ['Samantha','Karen','Moira','Allison','Ava','Google US English','Microsoft Aria','Microsoft Zira'];
  for(const name of prefer){
    const v = voices.find(vc => vc.name && vc.name.includes(name));
    if(v) return v;
  }
  return voices.find(v => v.lang === 'en-US' && v.localService) ||
         voices.find(v => v.lang === 'en-US') ||
         voices.find(v => v.lang && v.lang.startsWith('en-')) ||
         voices[0];
}

function getKoreanVoice(){
  const voices = window.speechSynthesis.getVoices();
  const prefer = ['Yuna','Heami','Microsoft Heami','Google 한국의','Google Korean'];
  for(const name of prefer){
    const v = voices.find(vc => vc.name && vc.name.includes(name) && vc.lang && vc.lang.startsWith('ko'));
    if(v) return v;
  }
  return voices.find(v => v.lang === 'ko-KR') ||
         voices.find(v => v.lang && v.lang.startsWith('ko')) ||
         null;
}

function speak(text, lang='en'){
  return new Promise((resolve)=>{
    if(!("speechSynthesis" in window)) { resolve(); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    if(lang === 'ko'){
      u.lang = 'ko-KR';
      u.rate = 1.0;
      u.pitch = 1.05;
      const v = getKoreanVoice();
      if(v) u.voice = v;
    } else {
      u.lang = 'en-US';
      u.rate = 0.78;
      u.pitch = 1.05;
      const v = getEnglishVoice();
      if(v) u.voice = v;
    }
    u.volume = 1.0;
    u.onend = ()=> resolve();
    u.onerror = ()=> resolve();
    setTimeout(()=> window.speechSynthesis.speak(u), 60);
  });
}

// === Reading flow ===
async function beginCurrentSentence(){
  const page = STORY_PAGES[currentPageIdx];
  if(!page || page.isCover) return;
  if(currentSentenceIdx >= page.sentences.length) return;

  const s = page.sentences[currentSentenceIdx];
  
  // Start listening (silent in background)
  startListening();
  
  // 1) AI speaks English first
  updateMic('🔊 영어 듣는 중...');
  await speak(s.en, 'en');
  
  // 2) AI speaks Korean
  updateMic('🔊 한국어 듣는 중...');
  await new Promise(r => setTimeout(r, 200));
  await speak(s.ko, 'ko');
  
  // 3) Now invite child to repeat
  await new Promise(r => setTimeout(r, 400));
  updateMic('🎤 따라 말해보세요!');
  document.getElementById('micStatus').classList.add('listening');
  document.getElementById('micIcon').textContent = '🟢';
}

function startListening(){
  if(!recognition){
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(!SR){
      updateMic('⚠️ 이 브라우저는 음성인식을 지원하지 않아요.');
      return;
    }
    recognition = new SR();
    recognition.lang = 'en-US';
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.maxAlternatives = 3;
  }

  recognition.onresult = (event) => {
    if(inProgress) return;
    const last = event.results[event.results.length - 1];
    if(!last.isFinal) return;
    handleResult(last[0].transcript);
  };

  recognition.onerror = (e) => {
    if(e.error === 'no-speech' || e.error === 'aborted') return;
    if(e.error === 'not-allowed'){
      updateMic('⚠️ 마이크 권한을 허용해주세요');
      isListening = false;
      return;
    }
  };

  recognition.onend = () => {
    isListening = false;
    clearTimeout(restartTimer);
    restartTimer = setTimeout(()=>{
      if(!isListening && audioUnlocked){
        startListening();
      }
    }, 300);
  };

  try {
    recognition.start();
    isListening = true;
  } catch(e){}
}

function updateMic(text){
  document.getElementById('micText').textContent = text;
}

function normalize(s){
  return s.toLowerCase()
    .replace(/[^a-z\s\']/g, ' ')
    .split(/\s+/).filter(w => w.length > 0);
}

function scoreMatch(spoken, target){
  const sw = normalize(spoken);
  const tw = normalize(target);
  if(tw.length === 0) return 0;
  let matches = 0;
  for(const t of tw){
    if(sw.some(w => {
      if(w === t) return true;
      if(w.length > 2 && t.length > 2 && (w.includes(t) || t.includes(w))) return true;
      return false;
    })) matches++;
  }
  return matches / tw.length;
}

async function handleResult(transcript){
  if(inProgress) return;
  const page = STORY_PAGES[currentPageIdx];
  if(!page || page.isCover) return;
  const target = page.sentences[currentSentenceIdx];
  if(!target) return;

  const score = scoreMatch(transcript, target.en);
  const tw = normalize(target.en).length;
  // Very lenient for 7yo: 30% for >3 words, 50% for short
  const threshold = tw <= 3 ? 0.5 : 0.25;

  if(score >= threshold){
    inProgress = true;
    document.getElementById('micStatus').classList.remove('listening');
    document.getElementById('micIcon').textContent = '✅';
    showToast(`✅ 잘 읽었어요!`, 'success', 1500);
    await advanceSentence();
    inProgress = false;
  } else {
    showToast(`💭 "${transcript}" — 다시!`, 'fail', 1800);
  }
}

async function advanceSentence(){
  currentSentenceIdx++;
  renderDots();
  
  const page = STORY_PAGES[currentPageIdx];
  if(currentSentenceIdx >= page.sentences.length){
    await pageComplete();
  } else {
    await new Promise(r => setTimeout(r, 600));
    showCurrentSentence();
    await new Promise(r => setTimeout(r, 600));
    beginCurrentSentence();
  }
}

async function pageComplete(){
  showStars();
  showToast('🎉 한 페이지를 다 읽었어요!', 'success', 2500);
  document.getElementById('micStatus').classList.remove('listening');
  document.getElementById('micIcon').textContent = '🎉';
  
  await new Promise(r => setTimeout(r, 2500));
  
  if(currentPageIdx < STORY_PAGES.length - 1){
    currentPageIdx++;
    if(STORY_PAGES[currentPageIdx] && STORY_PAGES[currentPageIdx].isCover) currentPageIdx++;
    if(currentPageIdx >= STORY_PAGES.length){
      bookComplete();
      return;
    }
    renderPage();
    setTimeout(()=> beginCurrentSentence(), 600);
  } else {
    bookComplete();
  }
}

async function bookComplete(){
  showStars('🏆🎉⭐✨');
  showToast('🏆 책을 다 읽었어요! 정말 잘했어요!', 'success', 5000);
  setTimeout(()=>{
    if(confirm('🏆 책을 다 읽었어요!\n\n메인 메뉴로 돌아갈까요?')){
      location.href = 'index.html';
    }
  }, 3000);
}

function replaySentence(){
  const page = STORY_PAGES[currentPageIdx];
  if(!page || page.isCover) return;
  if(currentSentenceIdx >= page.sentences.length) return;
  beginCurrentSentence();
}

function skipSentence(){
  if(inProgress) return;
  const page = STORY_PAGES[currentPageIdx];
  if(!page || page.isCover) return;
  if(currentSentenceIdx >= page.sentences.length) return;
  inProgress = true;
  showToast('⏭ 건너뛰기', 'success', 1000);
  advanceSentence().then(()=> inProgress = false);
}

function prevPage(){
  if(currentPageIdx <= 1) return;
  currentPageIdx--;
  if(STORY_PAGES[currentPageIdx].isCover) currentPageIdx--;
  if(currentPageIdx < 1) currentPageIdx = 1;
  renderPage();
  setTimeout(()=> beginCurrentSentence(), 400);
}

function nextPage(){
  if(currentPageIdx >= STORY_PAGES.length - 1){
    bookComplete();
    return;
  }
  currentPageIdx++;
  if(STORY_PAGES[currentPageIdx].isCover) currentPageIdx++;
  if(currentPageIdx >= STORY_PAGES.length){
    bookComplete();
    return;
  }
  renderPage();
  setTimeout(()=> beginCurrentSentence(), 400);
}

function showStars(emoji='⭐🎉✨'){
  const el = document.getElementById('starsFx');
  el.textContent = emoji;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

let toastTimer = null;
function showToast(text, type='success', duration=1800){
  const el = document.getElementById('toast');
  el.textContent = text;
  el.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{
    el.className = 'toast';
  }, duration);
}

if('speechSynthesis' in window){
  window.speechSynthesis.onvoiceschanged = () => {};
  window.speechSynthesis.getVoices();
}
initCover();
</script>
